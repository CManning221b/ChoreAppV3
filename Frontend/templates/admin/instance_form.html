<!-- templates/admin/instance_form.html -->
<div class="instance-form-section">
    <h2>{% if instance_id %}Edit Instance{% else %}Select an Instance{% endif %}</h2>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    {% if instance %}
    <form method="POST" action="{{ url_for('admin.update_chore_instance_details_admin') }}">

        <input type="hidden" id="instance_id" name="instance_id" value="{{ instance_id or '' }}">

        <div class="form-group">
            <label for="chore">Chore</label>
            <input type="text" id="chore" name="chore" value="{{ chores[instance.chore_id].label }}" disabled>
        </div>

        <div class="form-group">
            <label for="assigned_to">Assigned To</label>
            <select id="assigned_to" name="assigned_to" required>
                {% for user_id, user in users.items() %}
                    <option value="{{ user_id }}" {% if instance.assigned_to == user_id %}selected{% endif %}>
                        {{ user.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" required>
                <option value="pending" {% if instance.status.value == 'pending' %}selected{% endif %}>Pending</option>
                <option value="complete" {% if instance.status.value == 'complete' %}selected{% endif %}>Complete</option>
            </select>
        </div>

        <div class="form-group">
            <label for="due_date">Due Date</label>
            <input type="date" id="due_date" name="due_date" value="{{ instance.due_date }}" disabled>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Instance</button>
            <button type="button" class="btn-danger" onclick="deleteInstance('{{ instance_id }}')">Delete Instance</button>
        </div>
    </form>
    {% else %}
    <p>Select an instance from the dropdown to edit it.</p>
    {% endif %}
</div>

<script>
function deleteInstance(instanceId) {
    if (confirm('Are you sure you want to delete this instance?')) {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '{{ url_for("admin.delete_chore_instance_admin", instance_id="") }}' + instanceId;
        document.body.appendChild(form);
        form.submit();
    }
}
</script>
