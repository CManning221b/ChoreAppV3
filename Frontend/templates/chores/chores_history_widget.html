{% block additional_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/choresHistory.css') }}">
{% endblock %}
<div class="choresHistory">
    <h2>Chore History</h2>
    <table>
        <tr>
            <th>Chore</th>
            <th>Completed by</th>
            <th>Completed at</th>
        </tr>
        {% for entry in history_data %}
        <tr>
            <td>{{ entry.chore_name }}</td>
            <td>{{ entry.user_name }}</td>
            <td>{{ entry.date }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
